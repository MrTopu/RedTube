    <style>
  /* The Main Card */
  .v-card {
    max-width: 450px;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    margin: 20px auto;
    border: 1px solid #eee;
  }

  /* Image & Play Button Container */
  .v-thumb-area {
    position: relative;
    width: 100%;
    height: 250px;
    overflow: hidden;
  }

  .v-thumb-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  /* Animated Play Button Overlay */
  .v-play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ff0000;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    transition: all 0.3s ease;
    cursor: pointer;
    z-index: 2;
  }

  .v-play-triangle {
    width: 0;
    height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 16px solid white;
    margin-left: 5px;
  }

  /* Info Section */
  .v-info {
    padding: 20px;
  }

  .v-tag {
    background: #fff0f0;
    color: #ff0000;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .v-title {
    font-size: 20px;
    margin: 10px 0;
    color: #222;
    line-height: 1.3;
    display: block;
    text-decoration: none;
  }

  /* Metadata Row */
  .v-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #777;
    border-top: 1px solid #f0f0f0;
    padding-top: 15px;
    margin-top: 10px;
  }

  /* Hover Effects */
  .v-card:hover .v-thumb-area img {
    transform: scale(1.1);
  }

  .v-card:hover .v-play-overlay {
    background: #cc0000;
    transform: translate(-50%, -50%) scale(1.1);
  }
</style>
