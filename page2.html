    <style>
        /* Modern Design Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0f0f0f; color: #ffffff; line-height: 1.6; }

        /* Header & Navigation */
        header { background-color: #202020; padding: 15px 5%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; text-align: center;}
        header h1 { color: #ff0000; font-size: 24px; letter-spacing: -1px; }
        
        .promo-bar { background: #ff0000; color: white; text-align: center; padding: 10px; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .promo-bar a { color: white; text-decoration: underline; margin-left: 10px; }

        /* Video Grid Layout */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* Video Card Styles */
        .video-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; transition: transform 0.2s; border: 1px solid #333; }
        .video-card:hover { transform: scale(1.02); border-color: #ff0000; }
        
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; /* 16:9 Aspect Ratio */ overflow: hidden; background: #000; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        .play-overlay::after { content: ''; display: block; width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 15px solid white; margin-left: 5px; }

        .video-info { padding: 12px; }
        .video-info h3 { font-size: 16px; margin-bottom: 8px; color: #efefef; height: 45px; overflow: hidden; }
        
        .btn-watch { display: block; background: #ff0000; color: white; text-align: center; padding: 10px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .btn-watch:hover { background: #cc0000; }

        /* Telegram Section */
        .telegram-box { background: #0088cc; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
        .telegram-box a { background: white; color: #0088cc; padding: 10px 20px; text-decoration: none; border-radius: 20px; font-weight: bold; margin-top: 10px; display: inline-block; }

        footer { text-align: center; padding: 40px; color: #777; font-size: 12px; }
    </style>
